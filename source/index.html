<!doctype html>
<html lang="fr-FR" dir="ltr">
  <head>
    <!-- Basics -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="css/main.css" />
    <link rel="icon" type="image/png" href="img/favicon.png" />

    <!-- For robots & browsers -->
    <meta name="robots" content="index,follow" />
    <meta name="googlebot" content="index,follow" />
    <meta name="google" content="notranslate" />

    <!-- Content -->
    <title>
      Lorraine Ipsum - Attention, ça routche ! Ui, un Lorem Ipsum, mais pour les
      Lorrains
    </title>
    <meta name="author" content="Thomas Pericoi" />
    <meta
      name="description"
      content="Lorraine Ipsum - Attention, ça routche ! Ui, c'est un Lorem Ipsum, mais
      pour les Lorrains"
    />

    <!-- Open Graph Protocol -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Lorraine Ipsum" />
    <meta property="og:url" content="https://lorraineipsum.fr/" />
    <meta property="og:locale" content="fr_FR" />
    <meta
      property="og:description"
      content="Lorraine Ipsum - Attention, ça routche ! Ui, c'est un Lorem Ipsum, mais
      pour les Lorrains"
    />
    <meta
      property="og:image"
      content="https://upload.wikimedia.org/wikipedia/commons/thumb/b/b6/Flag_of_Lorraine.svg/1200px-Flag_of_Lorraine.svg.png"
    />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Chrome Theme -->
    <meta name="theme-color" content="#ffb301" />
  </head>

  <body>
    <noscript>
      <p class="noscript-message">
        Lorraine Ipsum nécessite JavaScript pour générer du texte.
      </p>
    </noscript>

    <div id="intro">
      <img
        class="intro-image fade-in"
        src="img/lorraineFlag.svg"
        width="130"
        height="130"
        alt="Drapeau de la Lorraine"
      />
      <h1 class="fade-in">Lorraine Ipsum</h1>
      <button
        id="btn-start"
        class="btn"
        type="button"
        aria-label="Commencer le générateur"
      >
        Commencer
      </button>

      <div class="credits">
        Créé par
        <a
          href="https://thomaspericoi.com/"
          target="_blank"
          rel="noopener noreferrer"
          id="btn-credits"
          >Thomas Pericoi</a
        >
      </div>
    </div>

    <div id="content" inert aria-hidden="true">
      <div id="generated-content">
        <p><b>Lorraine Ipsum</b></p>
      </div>
      <div class="options">
        <div class="input">
          <label class="sr-only" for="input-paragraphes">
            Nombre de paragraphes
          </label>
          <input
            id="input-paragraphes"
            type="number"
            min="1"
            max="99"
            value="3"
            inputmode="numeric"
            aria-describedby="paragraphes-help"
          />
          <span class="input-symbol" aria-hidden="true">¶</span>
          <p id="paragraphes-help" class="sr-only">
            Indiquez le nombre de paragraphes à générer, entre 1 et 99.
          </p>
        </div>
        <button id="btn-generate" class="btn" type="button">Générer</button>
        <button
          id="btn-copy"
          class="btn"
          type="button"
          aria-label="Copier le texte généré"
        >
          Copier
        </button>
        <p
          id="copy-status"
          class="sr-only"
          aria-live="polite"
          aria-atomic="true"
        ></p>
      </div>
    </div>

    <script src="js/main.js"></script>
  </body>
</html>
